<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝，生日快乐哦🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* 宇宙背景 */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=1920&q=80') center/cover;
            z-index: 0;
        }

        /* 深色遮罩增强文字可读性 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* 登录界面 */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .login-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            animation: floatUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            font-size: 1.8rem;
            color: #6ab7ff;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .login-subtitle {
            color: #a0c8ff;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: #a0c8ff;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(106, 183, 255, 0.5);
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .input-field:focus {
            border-color: #6ab7ff;
            box-shadow: 0 0 0 4px rgba(106, 183, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6ab7ff, #4a97ff);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(106, 183, 255, 0.4);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show { opacity: 1; }

        /* 主内容区 */
        .main-content {
            display: none;
            min-height: 100vh;
            position: relative;
        }

        .main-content.show { display: block; }

        /* 弹幕层 */
        .danmu-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .danmu-item {
            position: absolute;
            padding: 8px 20px;
            font-size: 1.2rem;
            white-space: nowrap;
            color: white;
            pointer-events: none;
            animation: danmuMove linear forwards;
            text-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
            font-weight: bold;
        }

        .danmu-item.heart { color: #ff6b9d; }
        .danmu-item.star { color: #ffcc00; }
        .danmu-item.blue { color: #6ab7ff; }
        .danmu-item.purple { color: #a066ff; }
        .danmu-item.cyan { color: #00e5ff; }

        @keyframes danmuMove {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* 生日信息容器 */
        .birthday-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
        }

        /* 蓝色蛋糕 */
        .blue-cake {
            position: relative;
            width: 240px;
            height: 200px;
            margin: 0 auto 30px;
        }

        /* 蛋糕底座 */
        .cake-base {
            position: absolute;
            width: 200px;
            height: 20px;
            background: linear-gradient(135deg, #b0c8e0, #8ca8d0);
            border-radius: 8px;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* 蛋糕主体 */
        .cake-body {
            position: absolute;
            width: 180px;
            height: 80px;
            background: linear-gradient(135deg, #6ab7ff, #4a97ff, #2a77ff);
            border-radius: 10px 10px 5px 5px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                inset 0 5px 20px rgba(255, 255, 255, 0.3),
                0 5px 20px rgba(0,0,0,0.2);
        }

        /* 蛋糕顶部 */
        .cake-top {
            position: absolute;
            width: 160px;
            height: 25px;
            background: linear-gradient(135deg, #8cc7ff, #6ab7ff, #4a97ff);
            border-radius: 10px 10px 0 0;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 蛋糕装饰层 */
        .cake-deco {
            position: absolute;
            width: 140px;
            height: 15px;
            background: linear-gradient(135deg, #a0d7ff, #6ab7ff);
            border-radius: 5px;
            bottom: 125px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 蜡烛 - 修复位置 */
        .candles {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
        }

        .candle {
            width: 6px;
            height: 30px;
            background: linear-gradient(to bottom, #ffffff, #e0f0ff, #c0e0ff);
            border-radius: 2px;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 12px;
            background: linear-gradient(to top, #ff9900, #ffcc00, #ffff00);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.3s ease-in-out infinite alternate;
            box-shadow: 0 0 10px #ff9900, 0 0 20px #ffcc00;
        }

        @keyframes flicker {
            0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1); }
            50% { transform: translateX(-50%) scaleY(1.1) scaleX(0.9); }
        }

        /* 装饰星星 */
        .decoration-star {
            position: absolute;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ffff00, #ffcc00);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 5px #ffcc00);
        }

        .star1 { top: 20px; left: 40px; animation: starTwinkle 2s infinite; }
        .star2 { top: 20px; right: 40px; animation: starTwinkle 2s infinite 0.5s; }
        .star3 { top: 60px; left: 30px; animation: starTwinkle 2s infinite 1s; }
        .star4 { top: 60px; right: 30px; animation: starTwinkle 2s infinite 1.5s; }
        .star5 { top: 100px; left: 50%; transform: translateX(-50%); animation: starTwinkle 2s infinite 0.8s; }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 糖霜装饰点 */
        .frosting {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .frost1 { top: 40px; left: 30px; }
        .frost2 { top: 40px; right: 30px; }
        .frost3 { top: 80px; left: 20px; }
        .frost4 { top: 80px; right: 20px; }
        .frost5 { top: 60px; left: 50%; transform: translateX(-50%); }

        /* 蛋糕阴影 */
        .cake-shadow {
            position: absolute;
            width: 180px;
            height: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            filter: blur(5px);
        }

        /* 生日文字 */
        .birthday-title {
            margin-top: 20px;
            font-size: 2.8rem;
            font-weight: 300;
            background: linear-gradient(135deg, #6ab7ff, #4a97ff, #a066ff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 6px;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(106, 183, 255, 0.3);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .birthday-name {
            font-size: 1.8rem;
            color: #a0c8ff;
            margin-top: 10px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(160, 200, 255, 0.5);
        }

        /* 流星 */
        .shooting-star {
            position: fixed;
            width: 150px;
            height: 3px;
            background: linear-gradient(to right, transparent, white, transparent);
            z-index: 0;
            animation: shootingStar linear forwards;
        }

        @keyframes shootingStar {
            0% { transform: translateX(-150px) translateY(0) rotate(45deg); opacity: 1; }
            100% { transform: translateX(100vw) translateY(100vh) rotate(45deg); opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .birthday-title { font-size: 2rem; letter-spacing: 4px; }
            .birthday-name { font-size: 1.4rem; letter-spacing: 3px; }
            .blue-cake { transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <!-- 宇宙背景 -->
    <div class="cosmic-bg"></div>
    <div class="bg-overlay"></div>
    
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1 class="login-title">你猜猜这个是给谁的awa</h1>
            <p class="login-subtitle">请输入你的生日和名字</p>
            
            <div class="input-group">
                <label class="input-label">用户名</label>
                <input type="text" class="input-field" id="username" placeholder="请输入用户名" value="">
            </div>
            
            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" class="input-field" id="password" placeholder="格式：月月日日" value="">
            </div>
            
            <button class="login-btn" id="loginBtn">进入星空祝福</button>
            <p class="error-message" id="errorMessage">用户名或密码错误</p>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
        <!-- 弹幕层 -->
        <div class="danmu-layer" id="danmuLayer"></div>
        
        <!-- 生日容器 -->
        <div class="birthday-container">
            <div class="blue-cake">
                <!-- 蜡烛 -->
                <div class="candles">
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                </div>
                
                <!-- 蛋糕底座 -->
                <div class="cake-base"></div>
                
                <!-- 蛋糕主体 -->
                <div class="cake-body"></div>
                
                <!-- 蛋糕顶部 -->
                <div class="cake-top"></div>
                
                <!-- 蛋糕装饰层 -->
                <div class="cake-deco"></div>
                
                <!-- 糖霜装饰点 -->
                <div class="frosting frost1"></div>
                <div class="frosting frost2"></div>
                <div class="frosting frost3"></div>
                <div class="frosting frost4"></div>
                <div class="frosting frost5"></div>
                
                <!-- 装饰星星 -->
                <div class="decoration-star star1"></div>
                <div class="decoration-star star2"></div>
                <div class="decoration-star star3"></div>
                <div class="decoration-star star4"></div>
                <div class="decoration-star star5"></div>
                
                <!-- 蛋糕阴影 -->
                <div class="cake-shadow"></div>
            </div>
            
            <h1 class="birthday-title">Happy Birthday</h1>
            <p class="birthday-name">吕文婧</p>
        </div>
    </div>
    
    <script>
        // 登录信息
        const CORRECT_USERNAME = '吕文婧';
        const CORRECT_PASSWORD = '0420'; // 4月20日

        // DOM元素
        const loginContainer = document.getElementById('loginContainer');
        const mainContent = document.getElementById('mainContent');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const danmuLayer = document.getElementById('danmuLayer');

        // 状态变量
        let autoDanmuInterval = null;
        let danmuSpeed = 1.3; // 提高弹幕基础速度
        let blessingIndex = 0;
        let autoMeteorInterval = null;
        let meteorActiveCount = 0;
        const MAX_METEORS = 8; // 最大流星数量

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 登录验证
            loginBtn.addEventListener('click', handleLogin);
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });

        // 登录处理
        function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (username === CORRECT_USERNAME && password === CORRECT_PASSWORD) {
                loginContainer.classList.add('hidden');
                mainContent.classList.add('show');
                startCelebration();
            } else {
                errorMessage.classList.add('show');
                passwordInput.style.borderColor = '#ff6b6b';
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                    passwordInput.style.borderColor = 'rgba(106, 183, 255, 0.5)';
                }, 3000);
            }
        }

        // 创建流星
        function createShootingStar() {
            if (meteorActiveCount >= MAX_METEORS) {
                return;
            }
            
            meteorActiveCount++;
            
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            
            const startX = Math.random() * 100;
            const startY = Math.random() * 30;
            const angle = Math.random() * 30 + 20;
            const distance = Math.sqrt(window.innerWidth * window.innerWidth + window.innerHeight * window.innerHeight) + 300;
            
            shootingStar.style.left = startX + 'vw';
            shootingStar.style.top = startY + 'vh';
            
            const width = Math.random() * 120 + 60; // 增加流星大小
            shootingStar.style.width = width + 'px';
            
            const speed = Math.random() * 0.8 + 0.4; // 加快流星速度
            shootingStar.style.animationDuration = speed + 's';
            
            const animationName = `shootingStar${Date.now()}`;
            const keyframes = `
                @keyframes ${animationName} {
                    0% { transform: translateX(0) translateY(0) rotate(${angle}deg); opacity: 1; }
                    100% { transform: translateX(${distance}px) translateY(${distance * Math.tan(angle * Math.PI / 180)}px) rotate(${angle}deg); opacity: 0; }
                }
            `;
            
            const style = document.createElement('style');
            style.textContent = keyframes;
            document.head.appendChild(style);
            
            shootingStar.style.animation = `${animationName} ${speed}s linear forwards`;
            
            const colors = ['#ffffff', '#6ab7ff', '#a0c8ff', '#4a97ff', '#a066ff', '#00e5ff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            shootingStar.style.background = `linear-gradient(to right, transparent, ${color}, transparent)`;
            
            document.querySelector('.main-content').appendChild(shootingStar);
            
            setTimeout(() => {
                if (shootingStar.parentNode) {
                    shootingStar.parentNode.removeChild(shootingStar);
                }
                if (style.parentNode) {
                    style.parentNode.removeChild(style);
                }
                meteorActiveCount--;
            }, speed * 1000);
        }

        // 庆祝效果
        function startCelebration() {
            // 自动发送弹幕 - 提高初始弹幕数量
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    generateAutoDanmu();
                }, i * 150); // 缩短初始弹幕间隔
            }
            
            // 设置自动弹幕间隔 - 提高弹幕频率
            autoDanmuInterval = setInterval(generateAutoDanmu, 600); // 大幅缩短弹幕间隔
            
            // 启动自动流星效果 - 提高流星频率
            startAutoMeteor();
            
            // 随机弹幕速度变化
            setInterval(() => {
                danmuSpeed = 0.9 + Math.random() * 1.0; // 0.9-1.9倍速
            }, 6000); // 缩短速度变化间隔
        }

        // 启动自动流星
        function startAutoMeteor() {
            // 初始创建更多流星
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createShootingStar();
                }, i * 200);
            }
            
            // 设置自动流星定时器 - 大幅提高频率
            autoMeteorInterval = setInterval(() => {
                // 95%的概率创建流星
                if (Math.random() > 0.05) {
                    createShootingStar();
                }
                
                // 60%的概率创建流星群
                if (Math.random() > 0.4) {
                    setTimeout(() => {
                        for (let j = 0; j < Math.floor(Math.random() * 5) + 2; j++) { // 2-6颗流星
                            setTimeout(() => {
                                createShootingStar();
                            }, j * 100);
                        }
                    }, 50);
                }
            }, 400); // 大幅缩短流星间隔
        }

        // 祝福语数组
        const blessings = [
            {text: '宝宝生日快乐！！！', type: 'heart'},
            {text: '愿你前程似锦，未来可期！✨', type: 'star'},
            {text: '爱你每一天！❤️', type: 'heart'},
            {text: '新的一岁更加美好！🌸', type: 'purple'},
            {text: '生日快乐我的臭宝！🎂', type: 'heart'},
            {text: '愿你永远幸福快乐！🎁', type: 'blue'},
            {text: '你是我的小幸运！💖', type: 'heart'},
            {text: '愿岁月温柔待你！🌹', type: 'purple'},
            {text: '愿你笑靥如花！🌺', type: 'cyan'},
            {text: '岁岁平安！🕊️', type: 'blue'},
            {text: '事事顺遂！🍀', type: 'blue'},
            {text: '愿你光芒万丈！⭐', type: 'star'},
            {text: '我的心里只有你！💘', type: 'heart'},
            {text: '生日快乐吕文婧！🎉', type: 'purple'},
            {text: '愿我们的爱情永恒！🌌', type: 'heart'},
            {text: '你是最美的星星！🌟', type: 'star'},
            {text: '愿你梦想成真！🌠', type: 'star'},
            {text: '永远守护你！🛡️', type: 'blue'},
            {text: '生日快乐我的宝贝！🎀', type: 'heart'},
            {text: '愿快乐永远相伴！😊', type: 'cyan'},
            {text: '你是我的满天星辰！🌃', type: 'star'},
            {text: '愿你的世界永远晴朗！☀️', type: 'cyan'},
            {text: '爱你到地老天荒！💑', type: 'heart'},
            {text: '愿我们永远在一起！💞', type: 'heart'},
            {text: '生日快乐，我的挚爱！💝', type: 'heart'},
            {text: '流星为你划过夜空！🌠', type: 'star'},
            {text: '星空见证我们的爱！💫', type: 'star'},
            {text: '愿你的生日如星光璀璨！🌟', type: 'star'},
            {text: '每一颗星都为你祝福！⭐', type: 'star'},
            {text: '在星空下许愿，愿成真！🌌', type: 'blue'}
        ];

        // 生成自动弹幕
        function generateAutoDanmu() {
            const blessing = blessings[blessingIndex % blessings.length];
            sendDanmu(blessing.text, blessing.type);
            blessingIndex++;
        }

        // 发送弹幕
        function sendDanmu(text, type = '') {
            const danmuItem = document.createElement('div');
            danmuItem.className = 'danmu-item';
            if (type) {
                danmuItem.classList.add(type);
            }
            danmuItem.textContent = text;
            
            const lineCount = 14; // 增加弹幕行数
            const lineHeight = 100 / lineCount;
            const line = Math.floor(Math.random() * lineCount);
            const top = line * lineHeight + Math.random() * (lineHeight - 20);
            
            danmuItem.style.top = top + '%';
            
            const colors = ['#6ab7ff', '#4a97ff', '#a0c8ff', '#ffcc00', '#ffffff', '#a066ff', '#00e5ff'];
            danmuItem.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            const size = Math.random() * 0.6 + 1.0; // 增大弹幕字体
            danmuItem.style.fontSize = (size * 1) + 'rem';
            
            const baseDuration = 10; // 大幅缩短基础时间
            const duration = baseDuration / (danmuSpeed + Math.random() * 0.8);
            danmuItem.style.animationDuration = duration + 's';
            
            danmuLayer.appendChild(danmuItem);
            
            setTimeout(() => {
                if (danmuItem.parentNode) {
                    danmuItem.parentNode.removeChild(danmuItem);
                }
            }, duration * 1000);
        }
    </script>
</body>
</html>
